# ╔══════════════════════════════════════════════════════════════╗
# ║  Hyprlock Configuration                                    ║
# ╚══════════════════════════════════════════════════════════════╝

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(81a1c1)
    inner_color = rgb(3b4252)
    font_color = rgb(d8dee9)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 6
    check_color = rgb(5e81ac)
    fail_color = rgb(bf616a)
    fail_text = <i>$FAIL</i>
    capslock_color = rgb(d08770)
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(d8dee9)
    font_size = 64
    font_family = PragmataPro Liga
    position = 0, 80
    halign = center
    valign = center
}
